name: Build and Push to GHCR

on:
  workflow_dispatch: 
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update image tag in diffchecker_kind
        env:
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          git clone https://x-access-token:${DEPLOY_PAT}@github.com/RD-95/diffchecker_kind.git
          cd diffchecker_kind
          sed -i "s/^  tag: .*/  tag: ${IMAGE_TAG}/" charts/diffchecker/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/diffchecker/values.yaml
          if git diff --cached --quiet; then
          echo "No changes to commit. Image tag is already up to date."
          else
          git commit -m "chore: update image tag to ${IMAGE_TAG}"
          git push
          fi
